<!doctype html><html lang="zh-Hant-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>桌圖設計 V3</title><style>
:root{--bg:#f5f1ec;--panel:#fffaf4;--ink:#30251f;--muted:#806f64;--line:#dfd2c5;--accent:#8b5e4a;--accent2:#b58a72}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"Microsoft JhengHei","PingFang TC",system-ui,sans-serif;padding:18px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 28px rgba(55,38,26,.1);padding:18px;margin-bottom:16px}
h1{font-size:24px;margin:0 0 6px}h2{font-size:18px;margin:0 0 12px}p{color:var(--muted);font-size:13px;line-height:1.6}label{display:block;font-size:13px;color:#5e5048;margin:8px 0 4px}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:10px;background:white;padding:8px 10px;font:inherit}
textarea{min-height:90px;resize:vertical}.grid{display:grid;gap:10px}.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:repeat(3,1fr)}
.btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 13px;cursor:pointer;color:var(--ink)}.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.placeholder{border:1px dashed var(--line);background:#fff;border-radius:14px;min-height:180px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);padding:18px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden}th,td{border-bottom:1px solid #eee2d6;padding:8px;text-align:left;font-size:13px}th{background:#fff4ea}
@media(max-width:850px){.two,.three{grid-template-columns:1fr}}
</style></head>
<body>
<section class="panel">
  <h1>桌圖設計</h1>
  <p>此模組目前先建立架構與欄位。之後提供廳房長寬、柱子、桌子、椅子、舞台、控台尺寸後，再建構精細桌圖產生與輸出 Word / PDF。</p>
</section>
<section class="panel">
  <h2>基本資料</h2>
  <div class="grid three">
    <label>廳房名稱<input placeholder="伊麗莎白"></label>
    <label>廳房寬度 cm<input type="number" placeholder="例如 1200"></label>
    <label>廳房深度 cm<input type="number" placeholder="例如 2200"></label>
    <label>桌數<input type="number" placeholder="例如 32"></label>
    <label>桌型<select><option>圓桌</option><option>長桌</option><option>圓桌 + 長桌</option></select></label>
    <label>舞台組數<input type="number" placeholder="例如 1"></label>
  </div>
</section>
<section class="panel">
  <h2>尺寸資料，待建構</h2>
  <div class="grid two">
    <label>圓桌尺寸<textarea placeholder="直徑、每桌人數、椅子尺寸"></textarea></label>
    <label>長桌尺寸<textarea placeholder="寬、深、每桌人數、椅子尺寸"></textarea></label>
    <label>柱子資料<textarea placeholder="柱子A：寬__ 深__ 距左牆__ 距上牆__"></textarea></label>
    <label>舞台 / 控台 / 出入口<textarea placeholder="舞台尺寸、控台位置、門口、不可擋區域"></textarea></label>
  </div>
</section>
<section class="panel">
  <h2>桌圖預覽</h2>
  <div class="placeholder">桌圖產生區，下一步建構<br>會依比例畫出廳房、柱子、桌子、椅子、舞台、控台。</div>
</section>
</body></html>
